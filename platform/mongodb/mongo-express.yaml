apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-express
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-express
  template:
    metadata:
      labels:
        app: mongo-express
    spec:
      containers:
        - name: mongo-express
          image: mongo-express:1.0.2
          ports:
            - containerPort: 8081
          env:
            # Use full connection string — ME_CONFIG_MONGODB_SERVER is ignored in 1.0.2
            - name: ME_CONFIG_MONGODB_URL
              value: "mongodb://admin:password123@mongodb:27017/"
            - name: ME_CONFIG_BASICAUTH_ENABLED
              value: "false"
---
# Exposed directly via MetalLB — gets its own IP (admin tool, not behind ingress)
apiVersion: v1
kind: Service
metadata:
  name: mongo-express
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: mongo-express
  ports:
    - port: 8081
      targetPort: 8081
