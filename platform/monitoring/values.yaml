# kube-prometheus-stack Helm values for local k3s lab
# Docs: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack

grafana:
  adminPassword: "admin" # change this if you care
  service:
    type: LoadBalancer # MetalLB assigns a 192.168.56.2xx IP
  # Use ghcr.io for the k8s-sidecar image — quay.io times out inside VirtualBox VMs
  sidecar:
    image:
      registry: ghcr.io
      repository: kiwigrid/k8s-sidecar
      tag: "2.5.0"

prometheus:
  service:
    type: LoadBalancer # also reachable directly if needed
  prometheusSpec:
    retention: 24h # keep 24h of metrics (saves disk on VMs)
    resources:
      requests:
        memory: 256Mi
      limits:
        memory: 512Mi

alertmanager:
  enabled: false # skip Alertmanager for a local lab

# k3s uses a non-standard API server endpoint — these need to be disabled
# or pointed at the correct addresses, otherwise the scrapers crash.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false
