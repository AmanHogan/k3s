controller:
  serviceType: LoadBalancer
  installPlugins:
    - kubernetes:latest
    - git:latest
    - workflow-aggregator:latest
    - pipeline-stage-view:latest
    - docker-workflow:latest

  # Mount the node's Docker socket so pipeline stages can run `docker build/push`
  # Note: this gives Jenkins full Docker access on the node — acceptable for homelab.
  volumes:
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock
  volumeMounts:
    - name: docker-sock
      mountPath: /var/run/docker.sock

  # Add jenkins user to docker group so it can use the socket without sudo
  initContainerEnv:
    - name: DOCKER_GID
      value: "999"

  containerEnv:
    - name: DOCKER_HOST
      value: "unix:///var/run/docker.sock"
