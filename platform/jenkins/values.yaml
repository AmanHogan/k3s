controller:
  serviceType: LoadBalancer
  installPlugins:
    - kubernetes:latest
    - git:latest
    - workflow-aggregator:latest
    - pipeline-stage-view:latest
    - docker-workflow:latest
    - ssh-slaves:latest
    - credentials:latest
    - ssh-credentials:latest

  # Mount the vagrant SSH private key for the jenkins-agent VM.
  # The secret is created once by scripts/setup-jenkins-agent.sh.
  volumes:
    - name: agent-ssh-key
      secret:
        secretName: jenkins-agent-ssh-key
  volumeMounts:
    - name: agent-ssh-key
      mountPath: /run/secrets/ssh-key
      readOnly: true

  # JCasC: configure the jenkins-agent VM as a permanent SSH node.
  # Builds run there — it has Docker + the registry (192.168.56.20:5001).
  JCasC:
    configScripts:
      agent-node: |
        credentials:
          system:
            domainCredentials:
              - credentials:
                  - basicSSHUserPrivateKey:
                      scope: GLOBAL
                      id: jenkins-agent-ssh
                      username: vagrant
                      description: "SSH key for jenkins-agent VM (192.168.56.20)"
                      privateKeySource:
                        directEntry:
                          privateKey: ${readFile:/run/secrets/ssh-key/privateKey}
        jenkins:
          nodes:
            - permanent:
                name: "jenkins-agent"
                labelString: "docker"
                numExecutors: 2
                remoteFS: "/home/vagrant/jenkins"
                launcher:
                  SSHLauncher:
                    host: "192.168.56.20"
                    port: 22
                    credentialsId: "jenkins-agent-ssh"
                    sshHostKeyVerificationStrategy: "nonVerifyingKeyVerificationStrategy"
