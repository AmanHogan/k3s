apiVersion: apps/v1
kind: Deployment
metadata:
  name: commitment-tracker-api
  namespace: commitment-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: commitment-tracker-api
  template:
    metadata:
      labels:
        app: commitment-tracker-api
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done",
            ]
      containers:
        - name: commitment-tracker-api
          image: 192.168.56.20:5001/commitment-tracker-api:cbcc4dc
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/amanhogan"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: commitment-tracker-api
  namespace: commitment-tracker
spec:
  selector:
    app: commitment-tracker-api
  ports:
    - port: 8080
      targetPort: 8080
