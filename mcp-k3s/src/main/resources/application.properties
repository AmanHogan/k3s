spring.application.name=mcp-k3s-cluster
spring.main.banner-mode=off

# Run as a web app (SSE transport + REST dashboard)
server.port=8082

# MCP server — SSE transport (VS Code Copilot connects via http://localhost:8082/sse)
spring.ai.mcp.server.name=mcp-k3s-cluster
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC

