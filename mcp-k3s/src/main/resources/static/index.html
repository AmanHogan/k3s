<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>k3s Cluster Dashboard</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
        background: #0f1117;
        color: #e0e0e0;
        padding: 24px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 28px;
      }

      header h1 {
        font-size: 1.6rem;
        font-weight: 600;
        color: #fff;
      }

      #refresh-info {
        font-size: 0.78rem;
        color: #666;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
        gap: 20px;
      }

      .card {
        background: #1a1d27;
        border: 1px solid #2a2d3e;
        border-radius: 10px;
        overflow: hidden;
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
        background: #1e2132;
        border-bottom: 1px solid #2a2d3e;
      }

      .card-header h2 {
        font-size: 0.95rem;
        font-weight: 600;
        color: #c0c4d6;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .badge {
        font-size: 0.72rem;
        background: #2a2d3e;
        border-radius: 12px;
        padding: 2px 10px;
        color: #888;
      }

      .card-body {
        padding: 14px 18px;
        max-height: 340px;
        overflow-y: auto;
      }

      .item {
        padding: 7px 0;
        border-bottom: 1px solid #1e2132;
        font-size: 0.82rem;
        font-family: "SF Mono", "Fira Code", monospace;
        white-space: pre-wrap;
        line-height: 1.5;
        color: #cdd0e0;
      }
      .item:last-child {
        border-bottom: none;
      }

      .item.warn {
        color: #f0a53a;
      }
      .item.error {
        color: #f05252;
      }
      .item.ok {
        color: #40c97b;
      }

      .empty {
        color: #555;
        font-size: 0.82rem;
        padding: 12px 0;
        font-style: italic;
      }

      .loading {
        color: #555;
        font-size: 0.82rem;
        padding: 12px 0;
      }

      /* namespace tabs */
      .ns-tabs {
        display: flex;
        gap: 6px;
        padding: 10px 18px;
        border-bottom: 1px solid #2a2d3e;
        flex-wrap: wrap;
      }

      .ns-tab {
        font-size: 0.75rem;
        padding: 3px 12px;
        border-radius: 14px;
        cursor: pointer;
        background: #22253a;
        border: 1px solid #2a2d3e;
        color: #888;
        transition: all 0.15s;
      }
      .ns-tab:hover {
        background: #2a2d3e;
        color: #ccc;
      }
      .ns-tab.active {
        background: #3b4cca;
        border-color: #3b4cca;
        color: #fff;
      }

      /* scrollbar */
      .card-body::-webkit-scrollbar {
        width: 5px;
      }
      .card-body::-webkit-scrollbar-track {
        background: transparent;
      }
      .card-body::-webkit-scrollbar-thumb {
        background: #2a2d3e;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>⎈ k3s Cluster Dashboard</h1>
      <span id="refresh-info">Loading…</span>
    </header>

    <div class="grid">
      <!-- Nodes -->
      <div class="card">
        <div class="card-header">
          <h2>Nodes</h2>
          <span class="badge" id="nodes-badge">—</span>
        </div>
        <div class="card-body" id="nodes-body">
          <div class="loading">Loading…</div>
        </div>
      </div>

      <!-- Pods -->
      <div class="card">
        <div class="card-header">
          <h2>Pods</h2>
          <span class="badge" id="pods-badge">—</span>
        </div>
        <div class="ns-tabs" id="pods-tabs"></div>
        <div class="card-body" id="pods-body">
          <div class="loading">Loading…</div>
        </div>
      </div>

      <!-- Deployments -->
      <div class="card">
        <div class="card-header">
          <h2>Deployments</h2>
          <span class="badge" id="depls-badge">—</span>
        </div>
        <div class="ns-tabs" id="depls-tabs"></div>
        <div class="card-body" id="depls-body">
          <div class="loading">Loading…</div>
        </div>
      </div>

      <!-- Services -->
      <div class="card">
        <div class="card-header">
          <h2>Services</h2>
          <span class="badge" id="svcs-badge">—</span>
        </div>
        <div class="ns-tabs" id="svcs-tabs"></div>
        <div class="card-body" id="svcs-body">
          <div class="loading">Loading…</div>
        </div>
      </div>

      <!-- Warning Events -->
      <div class="card">
        <div class="card-header">
          <h2>Warning Events</h2>
          <span class="badge" id="events-badge">—</span>
        </div>
        <div class="card-body" id="events-body">
          <div class="loading">Loading…</div>
        </div>
      </div>
    </div>

    <script>
      const NS_LIST = [
        "all",
        "default",
        "kube-system",
        "argocd",
        "monitoring",
        "jenkins",
      ];

      // active namespace per section
      const activens = { pods: "all", depls: "all", svcs: "all" };

      function buildTabs(sectionId, onChange) {
        const container = document.getElementById(sectionId + "-tabs");
        NS_LIST.forEach((ns) => {
          const btn = document.createElement("button");
          btn.className =
            "ns-tab" + (ns === activens[sectionId] ? " active" : "");
          btn.textContent = ns;
          btn.onclick = () => {
            activens[sectionId] = ns;
            container
              .querySelectorAll(".ns-tab")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            onChange(ns);
          };
          container.appendChild(btn);
        });
      }

      async function fetchLines(path) {
        const r = await fetch(path);
        if (!r.ok) throw new Error(await r.text());
        return r.json();
      }

      function renderLines(bodyId, badgeId, lines, classifyFn) {
        const body = document.getElementById(bodyId);
        const badge = document.getElementById(badgeId);
        badge.textContent = lines.length;
        if (!lines.length) {
          body.innerHTML = '<div class="empty">No items found</div>';
          return;
        }
        body.innerHTML = lines
          .map((l) => {
            const cls = classifyFn ? classifyFn(l) : "";
            return `<div class="item ${cls}">${escHtml(l)}</div>`;
          })
          .join("");
      }

      function escHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function nodeClass(line) {
        return line.includes("Ready=True") ? "ok" : "error";
      }

      function podClass(line) {
        if (line.includes("Running")) return "ok";
        if (line.includes("Completed")) return "";
        return "error";
      }

      function deplClass(line) {
        // "0/1 ready" → error; "1/1 ready" → ok
        const m = line.match(/(\d+)\/(\d+) ready/);
        if (m) return m[1] === m[2] ? "ok" : "error";
        return "";
      }

      async function refreshNodes() {
        try {
          const lines = await fetchLines("/api/nodes");
          renderLines("nodes-body", "nodes-badge", lines, nodeClass);
        } catch (e) {
          document.getElementById("nodes-body").innerHTML =
            `<div class="item error">Error: ${escHtml(e.message)}</div>`;
        }
      }

      async function refreshPods(ns) {
        try {
          const lines = await fetchLines(`/api/pods/${ns}`);
          renderLines("pods-body", "pods-badge", lines, podClass);
        } catch (e) {
          document.getElementById("pods-body").innerHTML =
            `<div class="item error">Error: ${escHtml(e.message)}</div>`;
        }
      }

      async function refreshDepls(ns) {
        try {
          const lines = await fetchLines(`/api/deployments/${ns}`);
          renderLines("depls-body", "depls-badge", lines, deplClass);
        } catch (e) {
          document.getElementById("depls-body").innerHTML =
            `<div class="item error">Error: ${escHtml(e.message)}</div>`;
        }
      }

      async function refreshSvcs(ns) {
        try {
          const lines = await fetchLines(`/api/services/${ns}`);
          renderLines("svcs-body", "svcs-badge", lines, null);
        } catch (e) {
          document.getElementById("svcs-body").innerHTML =
            `<div class="item error">Error: ${escHtml(e.message)}</div>`;
        }
      }

      async function refreshEvents() {
        try {
          const lines = await fetchLines("/api/events/all");
          renderLines("events-body", "events-badge", lines, () => "warn");
        } catch (e) {
          document.getElementById("events-body").innerHTML =
            `<div class="item error">Error: ${escHtml(e.message)}</div>`;
        }
      }

      function refreshAll() {
        const now = new Date().toLocaleTimeString();
        document.getElementById("refresh-info").textContent =
          `Last refresh: ${now} · auto every 30s`;
        refreshNodes();
        refreshPods(activens.pods);
        refreshDepls(activens.depls);
        refreshSvcs(activens.svcs);
        refreshEvents();
      }

      // Build namespace tabs wired to their refresh functions
      buildTabs("pods", refreshPods);
      buildTabs("depls", refreshDepls);
      buildTabs("svcs", refreshSvcs);

      // Initial load + 30s auto-refresh
      refreshAll();
      setInterval(refreshAll, 30_000);
    </script>
  </body>
</html>
