apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-k3s-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AmanHogan/k3s
    targetRevision: HEAD
    path: platform/mcp-k3s
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
